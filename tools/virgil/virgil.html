<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virgil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background: #ffffff;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 400;
        }

        .page {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
            align-items: center;
            padding: 4rem 5rem;
            gap: 4rem;
        }

        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo img {
            width: 100%;
            max-width: 640px;
            height: auto;
            display: block;
        }

        .content {
            max-width: 480px;
        }

        .title {
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
            font-weight: 600;
            font-size: clamp(4rem, 8vw, 7rem);
            line-height: 1;
            letter-spacing: 0.08em;
            color: #111;
            margin-bottom: 0.75rem;
        }

        .description {
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 400;
            font-size: 1.35rem;
            line-height: 1.45;
            color: #444;
            margin-bottom: 2.75rem;
        }

        .steps {
            list-style: none;
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.15rem;
            line-height: 1.9;
            color: #222;
        }

        .steps li {
            font-weight: 400;
        }

        a {
            color: #4a6fa5;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .page {
                grid-template-columns: 1fr;
                padding: 3rem 2rem;
                gap: 2.5rem;
            }
            .logo img {
                max-width: 380px;
            }
            .content {
                max-width: 100%;
            }
        }
    </style>
</head>
