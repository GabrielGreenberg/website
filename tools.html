<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GQ900QDSEE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GQ900QDSEE');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Greenberg - Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        html {
            background: url(images/purple.jpg) no-repeat center center fixed;
            -webkit-background-size: cover;
            -moz-background-size: cover;
            -o-background-size: cover;
            background-size: cover;
            height: 100%;
        }
        /* Fix for iOS/tablet/mobile background-attachment: fixed issue */
        @media screen and (max-width: 1024px) {
            html {
                background: none;
                height: auto;
                min-height: 100%;
            }
            body {
                background: url(images/purple.jpg) no-repeat center top;
                -webkit-background-size: cover;
                -moz-background-size: cover;
                -o-background-size: cover;
                background-size: cover;
                min-height: 100vh;
            }
        }
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            color: rgb(88,88,88);
            margin: 0;
            padding: 0;
            font-size: 14px;
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }
        .menu {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 15px 0;
            text-align: center;
            width: 80%;
            max-width: 800px;
            margin: 10px auto 0 auto;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border-radius: 8px;
        }
        .menu a {
            color: black;
            text-decoration: none;
            padding: 10px 20px;
            font-weight: 500;
            font-size: 14pt;
            text-transform: none;
            border-radius: 4px;
            transition: background-color 0.2s ease;
        }
        .menu a:hover {
            background-color: rgba(0, 0, 0, 0.05);
            text-decoration: none;
        }
        .menu a.active {
            color: #7744bb;
            background-color: white;
        }
        .content-wrapper {
            background: rgba(255, 255, 255, 0.5);
            width: 80%;
            max-width: 800px;
            margin: 10px auto 80px auto;
            border-radius: 8px;
        }
        .content {
            margin: 0 auto;
            padding: 20px 20px 40px 20px;
            overflow: auto;
        }
        .main-cell {
            background-color: white;
            border-radius: 8px;
            padding: 30px;
            max-width: 650px;
            margin: 0 auto;
        }
        .page-title {
            color: black;
            font-weight: 600;
            font-size: 22px;
            margin: 0 0 25px 0;
        }
        .section-divider {
            border: none;
            border-top: 1px solid #ccc;
            margin: 20px 0;
        }
        .tool-row {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
        }
        .tool-name {
            width: 160px;
            flex-shrink: 0;
            color: #7744bb;
            font-weight: 500;
            font-size: 15px;
            line-height: 1.4;
            padding-top: 2px;
        }
        .tool-name a {
            color: #7744bb;
            text-decoration: none;
        }
        .tool-name a:hover {
            text-decoration: underline;
        }
        .tool-description {
            flex: 1;
            min-width: 0;
            color: #444;
            line-height: 1.6;
            font-size: 15px;
            padding-top: 2px;
        }
        a {
            color: navy;
            text-decoration: none;
            transition: text-decoration 0.2s ease;
        }
        a:hover {
            text-decoration: underline;
        }

        /* ===========================================
           RESPONSIVE STYLES - Mobile & Tablet
           =========================================== */

        @media screen and (max-width: 768px) {
            .menu {
                flex-wrap: wrap;
                gap: 5px;
                padding: 10px 0;
                width: 95%;
                box-sizing: border-box;
            }
            .menu a {
                padding: 6px 10px;
                font-size: 11pt;
            }
            .content-wrapper {
                width: 95%;
                margin: 10px auto;
                box-sizing: border-box;
            }
            .main-cell {
                padding: 20px;
                max-width: 100%;
            }
            .tool-row {
                flex-direction: column;
                gap: 6px;
            }
            .tool-name {
                width: 100%;
                padding-top: 0;
            }
            .content {
                padding: 15px 10px 30px 10px;
            }
        }

        @media screen and (max-width: 480px) {
            .menu {
                width: 95%;
                gap: 2px;
                padding: 8px 0;
            }
            .menu a {
                padding: 5px 7px;
                font-size: 10pt;
            }
            .main-cell {
                padding: 15px;
            }
            .page-title {
                font-size: 20px;
            }
            .tool-name,
            .tool-description {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="menu">
        <a href="index.html">Home</a>
        <a href="cv.html">CV</a>
        <a href="papers.html">Papers</a>
        <a href="teaching.html">Teaching</a>
        <a href="talks.html">Talks</a>
        <a href="events.html">Events</a>
        <a href="tools.html" class="active">Tools</a>
    </div>

    <div class="content-wrapper">
        <div class="content">
            <div class="main-cell">
                <h1 class="page-title">Tools</h1>
                <hr class="section-divider">

                <div class="tool-row">
                    <div class="tool-name">
                        <a href="tools/virgil/virgil.html">Virgil</a>
                    </div>
                    <div class="tool-description">
                        AI-assisted visual LaTeX editor for academic writing.
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
